name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-audit:
    name: Build and audit (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ["20", "22"]
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up Node
        uses: actions/setup-node@v7
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install (clean)
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: npm audit (runtime deps, high+)
        run: npm audit --omit=dev --audit-level=high

      - name: npm audit (all deps, informational)
        run: npm audit --audit-level=high
        continue-on-error: true
